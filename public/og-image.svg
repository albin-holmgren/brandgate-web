<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: BrandGate dark green -->
  <rect width="1200" height="630" fill="#003822"/>

  <!-- Dot grid pattern -->
  <defs>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="white" opacity="0.06"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Gold accent bar -->
  <rect x="560" y="160" width="80" height="6" rx="3" fill="#E5A400"/>

  <!-- BRANDGATE label -->
  <text x="600" y="230" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="rgba(255,255,255,0.35)" text-anchor="middle" letter-spacing="8">BRANDGATE</text>

  <!-- Main headline line 1 -->
  <text x="600" y="310" font-family="Arial, sans-serif" font-size="60" font-weight="800" fill="white" text-anchor="middle" letter-spacing="-1">B2B Distribution Platform</text>

  <!-- Main headline line 2 -->
  <text x="600" y="380" font-family="Arial, sans-serif" font-size="60" font-weight="800" fill="white" text-anchor="middle" letter-spacing="-1">for Brands</text>

  <!-- Subtitle -->
  <text x="600" y="440" font-family="Arial, sans-serif" font-size="22" font-weight="300" fill="rgba(255,255,255,0.45)" text-anchor="middle">Manage distributors, orders, invoicing, and your branded store — all in one place.</text>

  <!-- CTA pill -->
  <rect x="470" y="480" width="260" height="52" rx="26" fill="#E5A400"/>
  <text x="600" y="512" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#1a1a1a" text-anchor="middle">brandgate.dev</text>
</svg>
