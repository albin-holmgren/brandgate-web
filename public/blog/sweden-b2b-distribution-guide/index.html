<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>sweden-b2b-distribution-guide | BrandGate Blog</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',sans-serif;background:#F5F5F5;color:#4D4D4D;line-height:1.6}
    .nav{position:sticky;top:0;background:#F5F5F5;border-bottom:1px solid #E3E3E3;z-index:50}
    .nav-inner{max-width:800px;margin:0 auto;padding:1rem 1.5rem;display:flex;justify-content:space-between;align-items:center}
    .nav-back{color:#6E6B6B;text-decoration:none;font-size:.875rem;font-weight:500}
    .lang-switcher{position:relative}
    .lang-btn{display:flex;align-items:center;gap:.5rem;padding:.5rem .75rem;background:white;border:1px solid #E3E3E3;border-radius:.375rem;font-size:.875rem;font-weight:500;color:#4D4D4D;cursor:pointer}
    .lang-btn:hover{border-color:#003822}
    .lang-btn.active{border-color:#003822}
    .lang-btn svg{width:12px;height:12px;transition:transform .2s}
    .lang-btn.active svg{transform:rotate(180deg)}
    .lang-dropdown{display:none;position:absolute;right:0;top:calc(100% + 4px);background:white;border:1px solid #E3E3E3;border-radius:.375rem;box-shadow:0 4px 12px rgba(0,0,0,.1);min-width:140px;z-index:100;overflow:hidden}
    .lang-dropdown.show{display:block}
    .lang-option{display:block;padding:.625rem .875rem;color:#4D4D4D;text-decoration:none;font-size:.875rem;transition:background .15s;border-bottom:1px solid #F5F5F5}
    .lang-option:last-child{border-bottom:none}
    .lang-option:hover{background:#F5F5F5}
    .lang-option.active{background:#003822;color:white}
    .content-wrap{max-width:800px;margin:0 auto;padding:2rem 1.5rem}
    .content{background:white;border-radius:1rem;box-shadow:0 4px 6px -1px rgba(0,0,0,.1);padding:2rem}
    .cta{background:#003822;border-radius:.75rem;padding:2rem;text-align:center;margin-top:2rem}
    .cta h3{color:white;font-size:1.5rem;margin-bottom:1rem}
    .cta p{color:rgba(255,255,255,.8);margin-bottom:1.5rem}
    .cta a{display:inline-block;background:#E5A400;color:#1A1A1A;padding:.875rem 2rem;border-radius:9999px;font-weight:600;text-decoration:none}
    .footer{border-top:1px solid #E3E3E3;margin-top:3rem;padding:2rem;text-align:center;color:#6E6B6B;font-size:.875rem}
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <a href="/blog" class="nav-back">← Back to Blog</a>
      <div class="lang-switcher">
        <button class="lang-btn" onclick="toggleLang()">
          <span>EN</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:12px;height:12px"><path d="M19 9l-7 7-7-7"/></svg>
        </button>
        <div class="lang-dropdown" id="langDropdown">
          <a href="/blog/sweden-b2b-distribution-guide/" class="lang-option active">English</a>
          <a href="/blog/sv/sweden-b2b-distribution-guide/" class="lang-option">Svenska</a>
        </div>
      </div>
    </div>
  </nav>
  <div class="content-wrap">
    <div class="content">
      <h1 style="font-size:2rem;color:#003822;font-weight:700;margin-bottom:1.5rem">sweden-b2b-distribution-guide</h1>
      <p>Content loading...</p>
      <div class="cta">
        <h3>Ready to streamline your distribution?</h3>
        <p>Join brands using BrandGate to manage their B2B distribution</p>
        <a href="https://brandgate.dev">Explore BrandGate</a>
      </div>
    </div>
  </div>
  <footer class="footer">
    <p>© <span id="year">2026</span> BrandGate. All rights reserved.</p>
  </footer>
  <script>
    function toggleLang(){const btn=document.querySelector('.lang-btn');const dropdown=document.getElementById('langDropdown');btn.classList.toggle('active');dropdown.classList.toggle('show')}
    document.addEventListener('click',function(e){const switcher=document.querySelector('.lang-switcher');if(!switcher.contains(e.target)){document.querySelector('.lang-btn').classList.remove('active');document.getElementById('langDropdown').classList.remove('show')}}
    document.getElementById('year').textContent=new Date().getFullYear()
  </script>
</body>
</html>
